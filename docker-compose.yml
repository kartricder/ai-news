version: '3.8'

services:
  ai-news:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-news
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist database
      - ./prisma/dev.db:/app/prisma/dev.db
      # Persist logs
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/articles?status=published&pageSize=1', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-news-network

networks:
  ai-news-network:
    driver: bridge
